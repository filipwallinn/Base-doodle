<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Classic Music Quiz - Bass Doodle</title>
  <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="quiz-body">
  <div class="background-overlay"></div>

  <header class="quiz-header">
    <button class="nav-btn btn-accent" onclick="goToMainMenu()"><i class="fas fa-arrow-left"></i> Main Menu</button>
    <h1>Classic Music Quiz</h1>
    <div class="nav-spacer"></div>
  </header>

  <div class="quiz-layout">
    <aside class="panel search-panel">
      <div class="search-bar">
        <input type="text" id="mainSearchInput" placeholder="Search for a song..." />
        <button class="btn-accent" onclick="searchSpotify()"><i class="fas fa-magnifying-glass"></i></button>
      </div>
      <ul id="searchResults"></ul>
    </aside>

    <main class="now-playing-panel">
      <div id="albumArtContainer">
        <img id="albumArt" src="{{ url_for('default_image') }}" alt="Album Art" />
        <div id="albumArtSpinner" class="spinner"></div>
      </div>
      <div id="nowPlayingInfo">
        <span id="nowPlayingTrack">Nothing playing yet</span>
        <span id="nowPlayingArtist"></span>
      </div>
      <div id="hintText"></div>
      <button class="hint-btn btn-accent" onclick="showHint()"><i class="fas fa-lightbulb"></i> Hint</button>
    </main>

    <aside class="panel controls-panel">
      <div class="control-group">
        <label>Play an artist's top song</label>
        <input type="text" id="artistInput" placeholder="Search by artist">
        <button class="btn-accent" onclick="searchByArtist()">Play Artist</button>
      </div>

      <div class="control-group">
        <label>Play a specific song</label>
        <input type="text" id="songInput" placeholder="Search by song">
        <button class="btn-accent" onclick="searchBySong()">Play Song</button>
      </div>

      <button id="sphealSurprise" class="surprise-btn btn-accent">Surprise!</button>
    </aside>
  </div>

  <div id="bottomControls">
    <button onclick="togglePlayback()" id="playPauseButton">
      <div class="flip-container">
        <div class="flipper">
          <div class="front"><i class="fas fa-pause"></i></div>
          <div class="back"><i class="fas fa-play"></i></div>
        </div>
      </div>
    </button>
  </div>
  <div id="toastContainer"></div>

  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
