<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#120f1a" />
      <stop offset="55%" stop-color="#1c1526" />
      <stop offset="100%" stop-color="#0d0b12" />
    </linearGradient>

    <radialGradient id="blobLavender" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d6c9f0" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#d6c9f0" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blobPlum" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7a5fa3" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#7a5fa3" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="blobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5fd0c6" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#5fd0c6" stop-opacity="0" />
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60" />
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgBase)" />

  <g filter="url(#softBlur)">
    <circle cx="320" cy="220" r="420" fill="url(#blobPlum)" />
    <circle cx="1550" cy="180" r="480" fill="url(#blobLavender)" />
    <circle cx="1650" cy="900" r="500" fill="url(#blobPlum)" />
    <circle cx="260" cy="920" r="440" fill="url(#blobTeal)" />
    <circle cx="960" cy="560" r="600" fill="url(#blobLavender)" opacity="0.35" />
  </g>

  <!-- Faint waveform motif -->
  <g stroke="#d6c9f0" stroke-width="2" fill="none" opacity="0.12">
    <path d="M -100 640 C 200 540, 400 740, 700 640 S 1200 540, 1500 640 S 2000 540, 2200 640" />
    <path d="M -100 700 C 250 620, 450 780, 750 700 S 1250 600, 1550 700 S 2000 620, 2200 700" />
    <path d="M -100 580 C 180 500, 420 660, 680 580 S 1150 480, 1480 580 S 2000 500, 2200 580" />
  </g>

  <!-- Minimal equalizer bars, bottom corner accent -->
  <g fill="#d6c9f0" opacity="0.08">
    <rect x="1780" y="960" width="10" height="60" rx="4" />
    <rect x="1800" y="920" width="10" height="100" rx="4" />
    <rect x="1820" y="980" width="10" height="40" rx="4" />
    <rect x="1840" y="940" width="10" height="80" rx="4" />
    <rect x="1860" y="900" width="10" height="120" rx="4" />
  </g>
</svg>
