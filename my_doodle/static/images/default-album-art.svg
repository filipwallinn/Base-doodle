<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241b33" />
      <stop offset="100%" stop-color="#0d0b12" />
    </linearGradient>

    <radialGradient id="coverGlow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#d6c9f0" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#d6c9f0" stop-opacity="0" />
    </radialGradient>

    <filter id="coverBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="url(#coverBase)" />

  <g filter="url(#coverBlur)">
    <circle cx="400" cy="300" r="260" fill="url(#coverGlow)" />
    <circle cx="620" cy="560" r="180" fill="#7a5fa3" opacity="0.25" />
    <circle cx="160" cy="600" r="160" fill="#5fd0c6" opacity="0.12" />
  </g>

  <!-- Minimal waveform -->
  <g stroke="#d6c9f0" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="220" y1="470" x2="220" y2="500" />
    <line x1="250" y1="440" x2="250" y2="530" />
    <line x1="280" y1="410" x2="280" y2="560" />
    <line x1="310" y1="455" x2="310" y2="515" />
    <line x1="340" y1="425" x2="340" y2="545" />
    <line x1="370" y1="395" x2="370" y2="575" />
    <line x1="400" y1="435" x2="400" y2="535" />
    <line x1="430" y1="405" x2="430" y2="565" />
    <line x1="460" y1="455" x2="460" y2="515" />
    <line x1="490" y1="425" x2="490" y2="545" />
    <line x1="520" y1="440" x2="520" y2="530" />
    <line x1="550" y1="470" x2="550" y2="500" />
    <line x1="580" y1="455" x2="580" y2="515" />
  </g>

  <text x="400" y="290" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="600" fill="#f0eaf5" letter-spacing="1">Files and Jules</text>
  <text x="400" y="350" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="34" fill="#c9b8e0" letter-spacing="4">MUSIC QUIZ</text>
</svg>
